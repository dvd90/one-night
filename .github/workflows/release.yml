name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  GODOT_VERSION: "4.7"
  GODOT_RELEASE: "4.7-stable"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_RELEASE }}

      - name: Install Godot + export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o /tmp/godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp
          sudo mv "/tmp/Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          curl -sSL -o /tmp/templates.tpz "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Import resources
        run: |
          godot --headless --import || true
          godot --headless --import

      - name: Run tests
        run: godot --headless -s tests/lite_test_runner.gd

      - name: Export all targets
        run: |
          mkdir -p export/web export/linux export/windows dist
          godot --headless --export-release "Web" export/web/index.html
          godot --headless --export-release "Linux" export/linux/one-night.x86_64
          godot --headless --export-release "Windows Desktop" export/windows/one-night.exe
          VERSION="${GITHUB_REF_NAME:-dev}"
          (cd export/web && zip -qr "../../dist/one-night-web-${VERSION}.zip" .)
          (cd export/linux && zip -qr "../../dist/one-night-linux-${VERSION}.zip" .)
          (cd export/windows && zip -qr "../../dist/one-night-windows-${VERSION}.zip" .)
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.zip
          generate_release_notes: true
          body: |
            **ONE NIGHT — The Docks (vertical slice).**

            A short PS1-style 3D gang brawler: fight four waves of Wharf Rats
            with your crew ally, then take down the Wharf Rat King.

            - `one-night-windows-*.zip` — unzip, run `one-night.exe` (unsigned; SmartScreen may warn)
            - `one-night-linux-*.zip` — unzip, `chmod +x one-night.x86_64`, run
            - `one-night-web-*.zip` — static web build, ready to upload to itch.io
              (or play at https://dvd90.github.io/one-night/)

      - name: Upload artifacts (non-tag runs)
        uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: one-night-builds
          path: dist/*.zip
