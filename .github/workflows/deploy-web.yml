name: CI & Web Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.7"
  GODOT_RELEASE: "4.7-stable"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_RELEASE }}

      - name: Install Godot + export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o /tmp/godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp
          sudo mv "/tmp/Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          curl -sSL -o /tmp/templates.tpz "https://github.com/godotengine/godot-builds/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Import resources
        run: |
          godot --headless --import || true
          godot --headless --import

      - name: Run tests
        run: godot --headless -s tests/lite_test_runner.gd

      - name: Export Web
        run: |
          echo "--- installed export templates ---"
          ls -la "$HOME/.local/share/godot/export_templates/" || true
          ls "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/" || true
          mkdir -p export/web
          godot --headless --verbose --export-release "Web" export/web/index.html 2>&1 | grep -vE "^(reimport|import|progress)" | tail -80
          test -f export/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: export/web

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
